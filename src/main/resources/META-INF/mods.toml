modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''${mod_description}'''

[[dependencies.${mod_id}]]
modId="forge"
mandatory=true
versionRange="${forge_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
mandatory=true
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

# MCglTF (glTF on Forge client). Ship `libs/mcgltf-1.20.1.jar` beside this mod for glTF entities.
[[dependencies.${mod_id}]]
modId="mcgltf"
mandatory=true
versionRange="[1.0,)"
ordering="NONE"
side="CLIENT"

# Embedded MrCrayfish vehicle code requires Framework + Posture (same as upstream vehicle mod).
[[dependencies.${mod_id}]]
modId="framework"
mandatory=true
versionRange="[0.7.10,)"
ordering="NONE"
side="BOTH"

# Controller support (optional at runtime; vehicle client references it when present).
[[dependencies.${mod_id}]]
modId="controllable"
mandatory=false
versionRange="[0.20,)"
ordering="NONE"
side="CLIENT"
